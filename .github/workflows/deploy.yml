name: Frontend CI (Flutter)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0 

      - name: Set up Flutter
        uses: subosito/flutter-action@f2c650741249fa6b3068e1a8e807185df19f56a5
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Static Analysis (Linter)
        run: flutter analyze 

      - name: Run Unit Tests
        run: flutter test --coverage 

      # --- SONARQUBE / SONARCLOUD STEP ---
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@e6b4ef8d616621448b61c37b98f2191564757134
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=healthyway-frontend
            -Dsonar.organization=TU_ORGANIZACION_REAL
            -Dsonar.sources=lib
            -Dsonar.tests=test
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
